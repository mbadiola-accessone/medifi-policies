<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediFi — Políticas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap');

        :root {
            --bg: #FAFAF8;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-secondary: #5A5A5A;
            --accent: #0B6E4F;
            --accent-light: #E8F5EF;
            --border: #E5E5E0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .logo span { color: var(--text); }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .links a {
            display: block;
            padding: 0.9rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s;
        }

        .links a:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        footer {
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Medi<span>Fi</span></div>
        <p class="subtitle">Documentos legales</p>
        <div class="links">
            <a href="privacy-policy.html">Política de Privacidad</a>
            <a href="terms-of-service.html">Términos de Servicio</a>
        </div>
    </div>
    <footer>&copy; 2026 MediFi — Edinfull S.A.</footer>
</body>
</html>
